<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | Ömer Faruk Vergisiz</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Inter',sans-serif;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;
  background:linear-gradient(160deg,#002B5C 0%,#0072CE 60%,#00B2A9 100%);
  color:#fff;padding:24px;
}
.code{font-size:clamp(6rem,15vw,10rem);font-weight:800;opacity:.15;position:absolute;}
h1{font-size:2rem;font-weight:800;margin-bottom:12px;position:relative;}
p{font-size:1.05rem;opacity:.8;max-width:420px;margin-bottom:32px;line-height:1.6;}
.btn{
  display:inline-block;background:#00B2A9;color:#fff;
  padding:14px 36px;border-radius:10px;font-weight:600;
  text-decoration:none;transition:background .25s,transform .2s;
}
.btn:hover{background:#009e96;transform:translateY(-2px);}
</style>
</head>
<body>
<div class="code">404</div>
<h1>Page Not Found</h1>
<p>The page you’re looking for doesn’t exist or has been moved. Let’s get you back on track.</p>
<a href="/" class="btn">← Back to Home</a>
</body>
</html>
